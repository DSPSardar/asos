# ─────────────────────────────────────────────────────────────
# ASOS v1 — Docker Compose (Production)
# Usage:
#   cp .env.example .env.production && nano .env.production
#   docker compose --env-file .env.production up -d
# ─────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: asos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-asos_db}
      POSTGRES_USER:     ${POSTGRES_USER:-asos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - asos_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asos_user} -d ${POSTGRES_DB:-asos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: asos_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - asos_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: asos_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asos_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asos_db}?schema=public
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV:     production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - asos_internal
      - asos_external
    ports:
      - "127.0.0.1:3000:3000"   # Only expose to localhost — Nginx proxies externally
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Conversation Worker ─────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: production
    container_name: asos_worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asos_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asos_db}?schema=public
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV:     production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - asos_internal
    deploy:
      replicas: 2          # Run 2 worker instances for parallel processing
      restart_policy:
        condition: on-failure
        max_attempts: 5

  # ── DB Migration (runs once then exits) ─────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: asos_migrate
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asos_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asos_db}?schema=public
      NODE_ENV:     production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - asos_internal
    restart: "no"

  # ── Nginx (reverse proxy + SSL) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: asos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - ./frontend:/var/www/frontend:ro     # Serve frontend static files
    depends_on:
      - api
    networks:
      - asos_external

  # ── Certbot (auto SSL renewal) ──────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: asos_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

# ── Networks ────────────────────────────────────────────────
networks:
  asos_internal:          # Backend services — no external access
    driver: bridge
  asos_external:          # Nginx — exposed to internet
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:
