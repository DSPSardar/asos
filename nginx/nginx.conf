# ─────────────────────────────────────────────────────────────
# ASOS v1 — Nginx Configuration
# Handles: SSL termination, rate limiting, API proxy,
#          WebSocket proxy, static frontend serving
# ─────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json application/javascript;
  gzip_min_length    1000;

  # ── Security headers ───────────────────────────────────────
  add_header X-Frame-Options        "SAMEORIGIN"    always;
  add_header X-Content-Type-Options "nosniff"       always;
  add_header X-XSS-Protection       "1; mode=block" always;
  add_header Referrer-Policy        "strict-origin"  always;
  server_tokens off;

  # ── Rate limiting zones ────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/m;

  # ── Upstream: API ──────────────────────────────────────────
  upstream asos_api {
    server api:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────
  server {
    listen 80;
    server_name app.yourdomain.com api.yourdomain.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS: Frontend ────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name app.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root  /var/www/frontend;
    index ASOS-Auth.html;

    # SPA fallback
    location / {
      try_files $uri $uri/ /ASOS-Auth.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }

  # ── HTTPS: API ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10m;

    # ── API routes ──────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://asos_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
    }

    # ── Auth — tighter rate limit ───────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;

      proxy_pass         http://asos_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WhatsApp webhook — generous rate limit ──────────────
    location /webhooks/ {
      limit_req zone=webhooks burst=50 nodelay;

      proxy_pass         http://asos_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Raw body for HMAC verification
      proxy_request_buffering off;
    }

    # ── Health check (public) ───────────────────────────────
    location /health {
      proxy_pass http://asos_api;
      access_log off;
    }

    # ── Block everything else ───────────────────────────────
    location / {
      return 404;
    }
  }
}
